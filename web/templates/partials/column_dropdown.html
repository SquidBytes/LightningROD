<!-- Reusable column header dropdown component.
     Required context variables:
       col_id        — unique column identifier (e.g., "charge_type")
       col_label     — display label (e.g., "Type")
       sort_key      — sort_by value for this column (e.g., "charge_type")
       current_sort_by  — current sort state (from template context)
       current_sort_dir — current sort direction ("asc" or "desc")
       filter_key    — query param name for value filtering, or None if not filterable
       filter_values — list of {value, label, checked} dicts, or empty list
       filter_form_id — id of the filter form to trigger (e.g., "filter-form")
-->
<th class="text-left px-4 py-3 text-gray-400 font-medium whitespace-nowrap {{ col_width|default('') }}">
    <div class="relative inline-block col-header-wrapper">
        <div class="flex items-center gap-1">
            <!-- Header click button for sort cycling -->
            <button
                type="button"
                onclick="cycleSortColumn('{{ sort_key }}', '{{ filter_form_id }}')"
                class="flex items-center gap-1 cursor-pointer hover:text-gray-200 transition-colors group"
            >
                <span>{{ col_label }}</span>
                <!-- Sort indicator -->
                {% if current_sort_by == sort_key %}
                    {% if current_sort_dir == 'asc' %}
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" />
                        </svg>
                    {% else %}
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                        </svg>
                    {% endif %}
                {% else %}
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-gray-500 group-hover:text-gray-300 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                {% endif %}
            </button>

            <!-- Filter icon button (only if there are filter values) -->
            {% if filter_values %}
            <button
                type="button"
                onclick="toggleColumnDropdown('{{ col_id }}', this)"
                class="col-filter-btn flex items-center text-gray-400 hover:text-blue-400 transition-colors ml-1 p-0.5 rounded hover:bg-gray-800"
                title="Filter {{ col_label }}"
            >
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2a1 1 0 01-.293.707L13 13.414V19a1 1 0 01-.553.894l-4 2A1 1 0 017 21v-7.586L3.293 6.707A1 1 0 013 6V4z" />
                </svg>
            </button>
            {% endif %}
        </div>

        <!-- Dropdown panel (filter-only, no sort section) -->
        {% if filter_values %}
        <div
            id="col-dropdown-{{ col_id }}"
            class="col-dropdown hidden fixed bg-gray-800 border border-gray-700 rounded-lg shadow-lg p-2 z-50 min-w-max max-h-80 overflow-y-auto"
        >
            <!-- Filter section -->
            <div>
                <div class="flex items-center justify-between px-2 py-1">
                    <p class="text-xs uppercase tracking-wide text-gray-500">Filter</p>
                    <div class="flex gap-2">
                        <button type="button" onclick="selectAllFilter('{{ filter_key }}')" class="text-xs text-blue-400 hover:text-blue-300">All</button>
                        <span class="text-gray-600">|</span>
                        <button type="button" onclick="deselectAllFilter('{{ filter_key }}')" class="text-xs text-blue-400 hover:text-blue-300">None</button>
                    </div>
                </div>
                {% for fv in filter_values %}
                <label class="flex items-center gap-2 px-2 py-1.5 hover:bg-gray-700 rounded cursor-pointer">
                    <input
                        type="checkbox"
                        class="col-filter-checkbox rounded border-gray-600 bg-gray-700 text-blue-600"
                        data-filter-key="{{ filter_key }}"
                        data-filter-value="{{ fv.value }}"
                        {% if fv.checked %}checked{% endif %}
                        onchange="stageColumnFilter('{{ filter_key }}')"
                    >
                    <span class="text-sm text-gray-300">{{ fv.label }}</span>
                </label>
                {% endfor %}
            </div>
        </div>
        {% endif %}
    </div>
</th>

<script>
(function() {
    // Only define these functions once on the page
    if (window._colDropdownInit) return;
    window._colDropdownInit = true;

    // Track whether any filter changed while dropdown was open
    window._filterDirty = false;

    function closeAllDropdowns() {
        var wasDirty = window._filterDirty;
        document.querySelectorAll('.col-dropdown').forEach(function(d) {
            d.classList.add('hidden');
        });
        // Apply pending filter changes when closing
        if (wasDirty) {
            window._filterDirty = false;
            var pageInput = document.getElementById('page_input');
            if (pageInput) pageInput.value = '1';
            if (typeof renderFilterChips === 'function') renderFilterChips();
            htmx.trigger(document.body, 'filterChanged');
        }
    }

    window.toggleColumnDropdown = function(colId, btnEl) {
        var dd = document.getElementById('col-dropdown-' + colId);
        var wasOpen = !dd.classList.contains('hidden');

        // Close all dropdowns (triggers apply if dirty)
        closeAllDropdowns();

        // If it was closed, open it
        if (!wasOpen) {
            dd.classList.remove('hidden');
            window._filterDirty = false;
            // Position fixed dropdown below the button
            if (btnEl) {
                var rect = btnEl.getBoundingClientRect();
                dd.style.top = (rect.bottom + 4) + 'px';
                dd.style.left = rect.left + 'px';
            }
        }
    };

    // Close on click outside — but not if clicking inside a dropdown
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.col-header-wrapper') && !e.target.closest('.col-dropdown')) {
            closeAllDropdowns();
        }
    });

    // Close on page scroll — fixed dropdown can't track scroll position
    window.addEventListener('scroll', function() {
        closeAllDropdowns();
    }, true);

    window.cycleSortColumn = function(sortKey, formId) {
        var sortByInput = document.getElementById('sort_by_input');
        var sortDirInput = document.getElementById('sort_dir_input');
        var currentSortBy = sortByInput ? sortByInput.value : '';
        var currentSortDir = sortDirInput ? sortDirInput.value : '';

        if (currentSortBy !== sortKey) {
            sortByInput.value = sortKey;
            sortDirInput.value = 'asc';
        } else if (currentSortDir === 'asc') {
            sortDirInput.value = 'desc';
        } else {
            sortByInput.value = '';
            sortDirInput.value = '';
        }
        htmx.trigger(document.body, 'filterChanged');
    };

    window.setSortAndFilter = function(sortKey, sortDir, formId) {
        var sortByInput = document.getElementById('sort_by_input');
        var sortDirInput = document.getElementById('sort_dir_input');
        if (sortByInput) sortByInput.value = sortKey;
        if (sortDirInput) sortDirInput.value = sortDir;
        // Close all dropdowns
        document.querySelectorAll('.col-dropdown').forEach(function(d) {
            d.classList.add('hidden');
        });
        // Trigger filter change
        htmx.trigger(document.body, 'filterChanged');
    };

    // Stage filter change — updates hidden input but does NOT trigger HTMX.
    // The actual refresh happens when the dropdown closes (closeAllDropdowns).
    window.stageColumnFilter = function(filterKey) {
        var checkboxes = document.querySelectorAll('.col-filter-checkbox[data-filter-key="' + filterKey + '"]');
        var checked = [];
        checkboxes.forEach(function(cb) {
            if (cb.checked) checked.push(cb.dataset.filterValue);
        });

        var hiddenInput = document.getElementById('filter_' + filterKey);
        if (hiddenInput) {
            if (checked.length === 0 || checked.length === checkboxes.length) {
                hiddenInput.value = '';
            } else {
                hiddenInput.value = checked.join(',');
            }
        }
        window._filterDirty = true;
    };

    // Legacy wrapper for external callers (e.g. removeFilter in filter_bar)
    window.applyColumnFilter = function(filterKey) {
        stageColumnFilter(filterKey);
        // Immediately apply — used by chip removal which happens outside dropdown
        window._filterDirty = false;
        var pageInput = document.getElementById('page_input');
        if (pageInput) pageInput.value = '1';
        if (typeof renderFilterChips === 'function') renderFilterChips();
        htmx.trigger(document.body, 'filterChanged');
    };

    window.selectAllFilter = function(filterKey) {
        document.querySelectorAll('.col-filter-checkbox[data-filter-key="' + filterKey + '"]').forEach(function(cb) {
            cb.checked = true;
        });
        stageColumnFilter(filterKey);
    };

    window.deselectAllFilter = function(filterKey) {
        document.querySelectorAll('.col-filter-checkbox[data-filter-key="' + filterKey + '"]').forEach(function(cb) {
            cb.checked = false;
        });
        stageColumnFilter(filterKey);
    };

    // Re-render filter chips after HTMX table swap
    document.body.addEventListener('htmx:afterSwap', function(evt) {
        if (evt.detail.target && evt.detail.target.id === 'sessions-table-region') {
            if (typeof renderFilterChips === 'function') renderFilterChips();
        }
    });
})();
</script>
