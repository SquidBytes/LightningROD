{% if saved %}
<div class="alert alert-success text-sm mb-3">Network costs saved.</div>
{% endif %}

{% for network in networks %}
<form hx-post="/settings/networks" hx-target="#networks-table" hx-swap="innerHTML"
      class="flex items-center gap-3 py-2 border-b border-base-300/50">
    <input type="hidden" name="network_id" value="{{ network.id }}">
    <span class="flex-1 min-w-0 truncate">
        <span class="badge text-white text-xs" style="background-color: {{ network.color or '#6B7280' }}">{{ network.network_name }}</span>
    </span>
    <div class="flex items-center gap-2">
        <span class="text-base-content/40 text-sm">$</span>
        <input type="number" name="cost_per_kwh" value="{{ '%.3f'|format(network.cost_per_kwh or 0) }}"
               step="0.001" min="0"
               class="input input-sm input-bordered w-24 text-right">
        <span class="text-base-content/40 text-sm">/kWh</span>
    </div>
    <label class="flex items-center gap-1.5 cursor-pointer">
        <input type="checkbox" name="is_free" {% if network.is_free %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-success">
        <span class="text-base-content/60 text-xs">Free</span>
    </label>
    <button type="submit" class="btn btn-primary btn-xs">
        Save
    </button>
</form>
{% endfor %}
