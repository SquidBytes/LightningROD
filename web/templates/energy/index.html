{% extends "base.html" %}
{% block content %}
<div class="max-w-6xl">
    <h1 class="text-3xl font-bold text-white mb-2">Energy Dashboard</h1>
    <p class="text-gray-400 mb-6">Track your total energy consumption, efficiency trends, and regenerative braking.</p>

    <!-- Time range filter bar -->
    <div class="flex items-center gap-2 mb-6">
        <a
            href="/energy?range=7d"
            hx-get="/energy?range=7d"
            hx-target="#energy-content"
            hx-swap="innerHTML"
            class="px-4 py-2 rounded-lg text-sm font-medium transition-colors {% if active_range == '7d' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:text-white hover:bg-gray-700{% endif %}"
        >Week</a>
        <a
            href="/energy?range=30d"
            hx-get="/energy?range=30d"
            hx-target="#energy-content"
            hx-swap="innerHTML"
            class="px-4 py-2 rounded-lg text-sm font-medium transition-colors {% if active_range == '30d' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:text-white hover:bg-gray-700{% endif %}"
        >Month</a>
        <a
            href="/energy?range=1y"
            hx-get="/energy?range=1y"
            hx-target="#energy-content"
            hx-swap="innerHTML"
            class="px-4 py-2 rounded-lg text-sm font-medium transition-colors {% if active_range == '1y' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:text-white hover:bg-gray-700{% endif %}"
        >Year</a>
        <a
            href="/energy?range=all"
            hx-get="/energy?range=all"
            hx-target="#energy-content"
            hx-swap="innerHTML"
            class="px-4 py-2 rounded-lg text-sm font-medium transition-colors {% if active_range == 'all' or not active_range %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:text-white hover:bg-gray-700{% endif %}"
        >All Time</a>
    </div>

    <!-- HTMX swap target -->
    <div id="energy-content">
        {% include "energy/partials/summary.html" %}
    </div>
</div>
{% endblock %}
