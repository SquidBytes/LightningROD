{# Network edit modal -- tabbed modal for editing a network's details and managing its locations #}

{# Header #}
<p class="text-xs text-base-content/50 uppercase tracking-wide font-medium">Edit Network</p>
<h3 class="text-lg font-semibold text-base-content">{{ network.network_name }}</h3>

{# Tabbed content using DaisyUI radio tabs #}
<form id="network-modal-form" class="mt-4">
    <div role="tablist" class="tabs tabs-bordered">

        {# Details tab #}
        <input type="radio" name="network-modal-tabs" role="tab" class="tab" aria-label="Details" checked="checked" />
        <div role="tabpanel" class="tab-content p-4">
            <div class="space-y-4">
                <label class="form-control w-full">
                    <div class="label"><span class="label-text">Network Name</span></div>
                    <input type="text" name="network_name" required
                           value="{{ network.network_name }}"
                           class="input input-bordered w-full">
                </label>

                <div class="flex gap-4">
                    <div class="flex flex-col gap-1">
                        <label class="label"><span class="label-text">Color Badge</span></label>
                        <input type="color" name="color"
                               value="{{ network.color or '#6B7280' }}"
                               class="h-8 w-14 rounded border border-base-300 bg-base-200 cursor-pointer p-0.5">
                    </div>

                    <label class="form-control flex-1">
                        <div class="label"><span class="label-text">Cost per kWh</span></div>
                        <input type="number" name="cost_per_kwh" step="0.001" min="0" placeholder="0.000"
                               value="{{ '%.3f'|format(network.cost_per_kwh) if network.cost_per_kwh is not none else '' }}"
                               class="input input-bordered w-full text-right">
                    </label>

                    <div class="flex flex-col gap-1">
                        <label class="label"><span class="label-text">Free</span></label>
                        <label class="flex items-center gap-1.5 cursor-pointer h-8">
                            <input type="checkbox" name="is_free"
                                   {% if network.is_free %}checked{% endif %}
                                   class="checkbox checkbox-sm checkbox-success">
                            <span class="text-base-content/60 text-xs">Is free</span>
                        </label>
                    </div>
                </div>

                <div>
                    <button type="button"
                        hx-post="/settings/networks/{{ network.id }}/recalculate"
                        hx-target="#recalc-result-{{ network.id }}"
                        hx-swap="innerHTML"
                        class="btn btn-warning btn-sm btn-outline mt-2"
                    >
                        Recalculate Session Costs
                    </button>
                    <span id="recalc-result-{{ network.id }}" class="text-sm ml-2"></span>
                </div>

                <label class="form-control w-full">
                    <div class="label"><span class="label-text">Notes</span></div>
                    <textarea name="notes" rows="3" placeholder="Optional notes..."
                              class="textarea textarea-bordered w-full resize-none">{{ network.notes or '' }}</textarea>
                </label>
            </div>
        </div>

        {# Locations tab #}
        <input type="radio" name="network-modal-tabs" role="tab" class="tab" aria-label="Locations" />
        <div role="tabpanel" class="tab-content p-4">
            <div id="network-locations-list"
                 hx-get="/settings/networks/{{ network.id }}/locations"
                 hx-trigger="intersect once"
                 hx-swap="innerHTML">
                <p class="text-base-content/50 text-sm">Loading locations...</p>
            </div>
        </div>

    </div>

    {# Footer: Cancel + Save #}
    <div class="flex items-center justify-end pt-4 mt-4 border-t border-base-300">
        <div class="flex items-center gap-3">
            <button type="button" onclick="closeNetworkModal()"
                    class="btn btn-ghost btn-sm">
                Cancel
            </button>
            <button type="button"
                    hx-put="/settings/networks/{{ network.id }}"
                    hx-target="#network-management-card"
                    hx-swap="outerHTML"
                    hx-include="#network-modal-form"
                    class="btn btn-primary btn-sm">
                Save
            </button>
        </div>
    </div>
</form>
