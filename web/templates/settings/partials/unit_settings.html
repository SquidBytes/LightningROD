{% if saved %}
<div class="alert alert-success text-sm mb-3">Unit preference saved.</div>
{% endif %}

<form hx-post="/settings/units" hx-target="#unit-settings" hx-swap="innerHTML"
      class="space-y-3">
    <label class="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-base-300/50 transition-colors">
        <input type="radio" name="efficiency_unit" value="us"
               {% if not settings.efficiency_unit or settings.efficiency_unit == 'us' %}checked{% endif %}
               class="radio radio-primary radio-sm">
        <div>
            <span class="text-sm font-medium">US Units</span>
            <span class="text-base-content/40 text-sm ml-2">mi/kWh (miles per kilowatt-hour)</span>
        </div>
    </label>
    <label class="flex items-center gap-3 cursor-pointer p-2 rounded-lg hover:bg-base-300/50 transition-colors">
        <input type="radio" name="efficiency_unit" value="eu"
               {% if settings.efficiency_unit == 'eu' %}checked{% endif %}
               class="radio radio-primary radio-sm">
        <div>
            <span class="text-sm font-medium">EU Units</span>
            <span class="text-base-content/40 text-sm ml-2">km/kWh (kilometers per kilowatt-hour)</span>
        </div>
    </label>
    <div class="pt-1">
        <button type="submit" class="btn btn-primary btn-sm">
            Save
        </button>
    </div>
</form>
