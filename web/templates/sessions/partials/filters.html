<!-- Filter bar — always server-rendered, not HTMX-swapped -->
<form id="filter-form">
    <div
        hx-get="/sessions"
        hx-include="#filter-form"
        hx-target="#sessions-table-region"
        hx-push-url="true"
        hx-trigger="filterChanged from:body"
        class="bg-gray-900 border border-gray-800 rounded-xl p-4 mb-4 flex flex-wrap gap-4 items-center"
    >
        <!-- Hidden inputs for filter values set by button clicks -->
        <input type="hidden" id="date_preset_input" name="date_preset" value="{{ date_preset or '' }}">
        <input type="hidden" id="charge_type_input" name="charge_type" value="{{ charge_type or '' }}">
        <input type="hidden" id="location_type_input" name="location_type" value="{{ location_type or '' }}">

        <!-- Date range presets -->
        <div class="flex items-center gap-2">
            <span class="text-gray-500 text-xs uppercase tracking-wide font-medium mr-1">Date</span>
            <div class="flex rounded-lg overflow-hidden border border-gray-700">
                {% set presets = [("7d", "7d"), ("30d", "30d"), ("90d", "90d"), ("ytd", "YTD"), ("1y", "1y"), ("all", "All")] %}
                {% for value, label in presets %}
                <button
                    type="button"
                    onclick="setFilter('date_preset_input', '{{ value }}'); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if date_preset == value %}bg-blue-600 text-white{% elif not date_preset and value == 'all' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >{{ label }}</button>
                {% endfor %}
            </div>
        </div>

        <!-- Custom date range -->
        <div class="flex items-center gap-2">
            <span class="text-gray-500 text-xs uppercase tracking-wide font-medium">From</span>
            <input
                type="date"
                name="date_from"
                value="{{ date_from or '' }}"
                onchange="document.getElementById('date_preset_input').value = ''; htmx.trigger(document.body, 'filterChanged')"
                class="bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-2 py-1.5 focus:outline-none focus:border-blue-500"
            >
            <span class="text-gray-500 text-xs uppercase tracking-wide font-medium">To</span>
            <input
                type="date"
                name="date_to"
                value="{{ date_to or '' }}"
                onchange="document.getElementById('date_preset_input').value = ''; htmx.trigger(document.body, 'filterChanged')"
                class="bg-gray-800 border border-gray-700 text-gray-200 text-sm rounded px-2 py-1.5 focus:outline-none focus:border-blue-500"
            >
        </div>

        <!-- Charge type filter -->
        <div class="flex items-center gap-2">
            <span class="text-gray-500 text-xs uppercase tracking-wide font-medium mr-1">Type</span>
            <div class="flex rounded-lg overflow-hidden border border-gray-700">
                <button
                    type="button"
                    onclick="setFilter('charge_type_input', ''); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if not charge_type %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >All</button>
                <button
                    type="button"
                    onclick="setFilter('charge_type_input', 'AC'); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if charge_type == 'AC' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >AC</button>
                <button
                    type="button"
                    onclick="setFilter('charge_type_input', 'DC'); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if charge_type == 'DC' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >DC</button>
            </div>
        </div>

        <!-- Location type filter -->
        <div class="flex items-center gap-2">
            <span class="text-gray-500 text-xs uppercase tracking-wide font-medium mr-1">Location</span>
            <div class="flex rounded-lg overflow-hidden border border-gray-700">
                <button
                    type="button"
                    onclick="setFilter('location_type_input', ''); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if not location_type %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >All</button>
                <button
                    type="button"
                    onclick="setFilter('location_type_input', 'home'); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if location_type == 'home' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >Home</button>
                <button
                    type="button"
                    onclick="setFilter('location_type_input', 'work'); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if location_type == 'work' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >Work</button>
                <button
                    type="button"
                    onclick="setFilter('location_type_input', 'public'); htmx.trigger(document.body, 'filterChanged')"
                    class="px-3 py-1.5 text-sm font-medium transition-colors {% if location_type == 'public' %}bg-blue-600 text-white{% else %}bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-gray-200{% endif %}"
                >Public</button>
            </div>
        </div>
    </div>
</form>

<script>
function setFilter(inputId, value) {
    document.getElementById(inputId).value = value;
}
</script>
