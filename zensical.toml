[project]
site_name = "LightningROD"
site_description = "Self-hosted charging analytics for Ford electric vehicles"
site_author = "SquidBytes"
site_url = "https://SquidBytes.github.io/LightningROD/"
extra_css = ["stylesheets/extra.css"]

nav = [
  {"Home" = "index.md"},
  {"Getting Started" = [
    "getting-started/installation.md",
    "getting-started/configuration.md",
    "getting-started/data-import.md",
  ]},
  {"User Guide" = [
    "guide/sessions.md",
    "guide/costs.md",
    "guide/energy.md",
    "guide/settings.md",
  ]},
  {"Development" = [
    "development/setup.md",
    "development/architecture.md",
    "development/database.md",
    "development/css.md",
  ]},
  {"Changelog" = "changelog.md"},
]

[project.theme]
variant = "modern"
logo = "assets/logo.svg"
favicon = "assets/favicon.svg"
features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.tabs",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.instant",
]

[project.theme.icon]
logo = "lucide/zap"

[project.theme.palette]
scheme = "slate"
primary = "custom"
accent = "custom"

# Extensions
[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.superfences]

[project.markdown_extensions.pymdownx.snippets]
base_path = ["."]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
