{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl">
    <h1 class="text-3xl font-bold text-white mb-2">Dashboard</h1>
    <p class="text-gray-400 mb-8">Your EV charging analytics at a glance.</p>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <p class="text-sm text-gray-400">Total Sessions</p>
            <p class="text-2xl font-bold text-white mt-1">--</p>
        </div>
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <p class="text-sm text-gray-400">Total Energy</p>
            <p class="text-2xl font-bold text-white mt-1">-- kWh</p>
        </div>
        <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
            <p class="text-sm text-gray-400">Total Cost</p>
            <p class="text-2xl font-bold text-white mt-1">$--</p>
        </div>
    </div>
    <p class="text-gray-500 text-sm mt-8">Data will populated upon availability</p>
</div>
{% endblock %}
