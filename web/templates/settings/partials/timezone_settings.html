{% if saved %}
<div class="alert alert-success text-sm mb-3">Timezone preference saved.</div>
{% endif %}

{% set current_tz = settings.get('user_timezone', 'UTC') %}

<form hx-post="/settings/timezone" hx-target="#timezone-settings" hx-swap="innerHTML"
      class="space-y-3">
    <label class="form-control w-full max-w-xs">
        <div class="label"><span class="label-text">Display Timezone</span></div>
        <select name="user_timezone" class="select select-bordered w-full">
            <optgroup label="US / Canada">
                <option value="America/New_York" {% if current_tz == 'America/New_York' %}selected{% endif %}>Eastern (New York)</option>
                <option value="America/Chicago" {% if current_tz == 'America/Chicago' %}selected{% endif %}>Central (Chicago)</option>
                <option value="America/Denver" {% if current_tz == 'America/Denver' %}selected{% endif %}>Mountain (Denver)</option>
                <option value="America/Los_Angeles" {% if current_tz == 'America/Los_Angeles' %}selected{% endif %}>Pacific (Los Angeles)</option>
                <option value="America/Phoenix" {% if current_tz == 'America/Phoenix' %}selected{% endif %}>Arizona (Phoenix)</option>
                <option value="America/Anchorage" {% if current_tz == 'America/Anchorage' %}selected{% endif %}>Alaska (Anchorage)</option>
                <option value="America/Honolulu" {% if current_tz == 'America/Honolulu' %}selected{% endif %}>Hawaii (Honolulu)</option>
                <option value="America/Toronto" {% if current_tz == 'America/Toronto' %}selected{% endif %}>Eastern (Toronto)</option>
                <option value="America/Vancouver" {% if current_tz == 'America/Vancouver' %}selected{% endif %}>Pacific (Vancouver)</option>
                <option value="America/Edmonton" {% if current_tz == 'America/Edmonton' %}selected{% endif %}>Mountain (Edmonton)</option>
                <option value="America/Winnipeg" {% if current_tz == 'America/Winnipeg' %}selected{% endif %}>Central (Winnipeg)</option>
                <option value="America/Halifax" {% if current_tz == 'America/Halifax' %}selected{% endif %}>Atlantic (Halifax)</option>
                <option value="America/St_Johns" {% if current_tz == 'America/St_Johns' %}selected{% endif %}>Newfoundland (St. John's)</option>
            </optgroup>
            <optgroup label="Central / South America">
                <option value="America/Mexico_City" {% if current_tz == 'America/Mexico_City' %}selected{% endif %}>Mexico City</option>
                <option value="America/Bogota" {% if current_tz == 'America/Bogota' %}selected{% endif %}>Bogota</option>
                <option value="America/Sao_Paulo" {% if current_tz == 'America/Sao_Paulo' %}selected{% endif %}>Sao Paulo</option>
                <option value="America/Argentina/Buenos_Aires" {% if current_tz == 'America/Argentina/Buenos_Aires' %}selected{% endif %}>Buenos Aires</option>
                <option value="America/Santiago" {% if current_tz == 'America/Santiago' %}selected{% endif %}>Santiago</option>
            </optgroup>
            <optgroup label="Europe">
                <option value="Europe/London" {% if current_tz == 'Europe/London' %}selected{% endif %}>London (GMT/BST)</option>
                <option value="Europe/Paris" {% if current_tz == 'Europe/Paris' %}selected{% endif %}>Paris (CET)</option>
                <option value="Europe/Berlin" {% if current_tz == 'Europe/Berlin' %}selected{% endif %}>Berlin (CET)</option>
                <option value="Europe/Madrid" {% if current_tz == 'Europe/Madrid' %}selected{% endif %}>Madrid (CET)</option>
                <option value="Europe/Rome" {% if current_tz == 'Europe/Rome' %}selected{% endif %}>Rome (CET)</option>
                <option value="Europe/Amsterdam" {% if current_tz == 'Europe/Amsterdam' %}selected{% endif %}>Amsterdam (CET)</option>
                <option value="Europe/Stockholm" {% if current_tz == 'Europe/Stockholm' %}selected{% endif %}>Stockholm (CET)</option>
                <option value="Europe/Helsinki" {% if current_tz == 'Europe/Helsinki' %}selected{% endif %}>Helsinki (EET)</option>
                <option value="Europe/Athens" {% if current_tz == 'Europe/Athens' %}selected{% endif %}>Athens (EET)</option>
                <option value="Europe/Moscow" {% if current_tz == 'Europe/Moscow' %}selected{% endif %}>Moscow (MSK)</option>
                <option value="Europe/Istanbul" {% if current_tz == 'Europe/Istanbul' %}selected{% endif %}>Istanbul (TRT)</option>
            </optgroup>
            <optgroup label="Asia / Middle East">
                <option value="Asia/Dubai" {% if current_tz == 'Asia/Dubai' %}selected{% endif %}>Dubai (GST)</option>
                <option value="Asia/Kolkata" {% if current_tz == 'Asia/Kolkata' %}selected{% endif %}>India (IST)</option>
                <option value="Asia/Bangkok" {% if current_tz == 'Asia/Bangkok' %}selected{% endif %}>Bangkok (ICT)</option>
                <option value="Asia/Singapore" {% if current_tz == 'Asia/Singapore' %}selected{% endif %}>Singapore (SGT)</option>
                <option value="Asia/Shanghai" {% if current_tz == 'Asia/Shanghai' %}selected{% endif %}>China (CST)</option>
                <option value="Asia/Hong_Kong" {% if current_tz == 'Asia/Hong_Kong' %}selected{% endif %}>Hong Kong (HKT)</option>
                <option value="Asia/Tokyo" {% if current_tz == 'Asia/Tokyo' %}selected{% endif %}>Tokyo (JST)</option>
                <option value="Asia/Seoul" {% if current_tz == 'Asia/Seoul' %}selected{% endif %}>Seoul (KST)</option>
            </optgroup>
            <optgroup label="Oceania">
                <option value="Australia/Perth" {% if current_tz == 'Australia/Perth' %}selected{% endif %}>Perth (AWST)</option>
                <option value="Australia/Adelaide" {% if current_tz == 'Australia/Adelaide' %}selected{% endif %}>Adelaide (ACST)</option>
                <option value="Australia/Sydney" {% if current_tz == 'Australia/Sydney' %}selected{% endif %}>Sydney (AEST)</option>
                <option value="Australia/Brisbane" {% if current_tz == 'Australia/Brisbane' %}selected{% endif %}>Brisbane (AEST)</option>
                <option value="Pacific/Auckland" {% if current_tz == 'Pacific/Auckland' %}selected{% endif %}>Auckland (NZST)</option>
            </optgroup>
            <optgroup label="Other">
                <option value="UTC" {% if current_tz == 'UTC' %}selected{% endif %}>UTC</option>
                <option value="Africa/Johannesburg" {% if current_tz == 'Africa/Johannesburg' %}selected{% endif %}>Johannesburg (SAST)</option>
                <option value="Africa/Cairo" {% if current_tz == 'Africa/Cairo' %}selected{% endif %}>Cairo (EET)</option>
                <option value="Africa/Lagos" {% if current_tz == 'Africa/Lagos' %}selected{% endif %}>Lagos (WAT)</option>
            </optgroup>
        </select>
    </label>
    <div class="label">
        <span class="label-text-alt text-base-content/40">All stored times remain in UTC. This setting controls display only.</span>
    </div>
    <div class="pt-1">
        <button type="submit" class="btn btn-primary btn-sm">
            Save
        </button>
    </div>
</form>
