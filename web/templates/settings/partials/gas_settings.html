{% if saved %}
<div class="alert alert-success text-sm mb-3">Settings saved.</div>
{% endif %}

<!-- Gasoline Comparison Form -->
<h3 class="text-sm font-semibold mb-3">Gasoline Comparison</h3>
<form hx-post="/settings/gas" hx-target="#gas-settings" hx-swap="innerHTML"
      class="space-y-3 mb-6">
    <div class="flex items-center gap-3">
        <label class="form-control w-full max-w-xs">
            <div class="label"><span class="label-text text-sm">Price / gallon</span></div>
            <div class="flex items-center gap-2">
                <span class="text-base-content/40 text-sm">$</span>
                <input type="number" name="gas_price"
                       value="{{ settings.gas_price_per_gallon or '3.50' }}"
                       step="0.01" min="0"
                       class="input input-sm input-bordered w-24 text-right">
            </div>
        </label>
    </div>
    <div class="flex items-center gap-3">
        <label class="form-control w-full max-w-xs">
            <div class="label"><span class="label-text text-sm">Vehicle MPG</span></div>
            <input type="number" name="vehicle_mpg"
                   value="{{ settings.vehicle_mpg or '28.0' }}"
                   step="0.1" min="1"
                   class="input input-sm input-bordered w-24 text-right">
        </label>
    </div>
    <div>
        <button type="submit" class="btn btn-primary btn-sm">
            Save
        </button>
    </div>
</form>

<!-- Display Toggle Options -->
<h3 class="text-sm font-semibold mb-3">Display Options</h3>
<form hx-post="/settings/toggles" hx-target="#gas-settings" hx-swap="innerHTML"
      class="space-y-2">
    <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="comparison_section_visible"
               {% if settings.comparison_section_visible == 'true' %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-primary">
        <span class="label-text text-sm">Show comparison section</span>
    </label>
    <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="comparison_gas_enabled"
               {% if settings.comparison_gas_enabled == 'true' %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-primary">
        <span class="label-text text-sm">Gasoline comparison</span>
    </label>
    <label class="flex items-center gap-2 cursor-pointer">
        <input type="checkbox" name="comparison_network_enabled"
               {% if settings.comparison_network_enabled == 'true' %}checked{% endif %}
               class="checkbox checkbox-sm checkbox-primary">
        <span class="label-text text-sm">Network rate comparison</span>
    </label>
    <div class="pt-1">
        <button type="submit" class="btn btn-primary btn-sm">
            Save
        </button>
    </div>
</form>
