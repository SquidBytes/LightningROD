{% if saved %}
<div class="text-green-400 text-sm mb-3">Network costs saved.</div>
{% endif %}

{% for network in networks %}
<form hx-post="/settings/networks" hx-target="#networks-table" hx-swap="innerHTML"
      class="flex items-center gap-3 py-2 border-b border-gray-800/50">
    <input type="hidden" name="network_id" value="{{ network.id }}">
    <span class="text-gray-200 text-sm flex-1 min-w-0 truncate">{{ network.network_name }}</span>
    <div class="flex items-center gap-2">
        <span class="text-gray-500 text-sm">$</span>
        <input type="number" name="cost_per_kwh" value="{{ '%.3f'|format(network.cost_per_kwh or 0) }}"
               step="0.001" min="0"
               class="w-24 bg-gray-800 border border-gray-700 rounded px-2 py-1 text-sm text-gray-200 text-right">
        <span class="text-gray-500 text-sm">/kWh</span>
    </div>
    <label class="flex items-center gap-1.5 cursor-pointer">
        <input type="checkbox" name="is_free" {% if network.is_free %}checked{% endif %}
               class="rounded bg-gray-800 border-gray-600 text-green-500 focus:ring-green-500">
        <span class="text-gray-400 text-xs">Free</span>
    </label>
    <button type="submit"
            class="px-3 py-1 text-xs bg-blue-600 hover:bg-blue-500 text-white rounded transition-colors">
        Save
    </button>
</form>
{% endfor %}
